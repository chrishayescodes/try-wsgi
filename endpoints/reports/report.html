{% extends "base.html" %}

{% block title %}Enterprise Report{% endblock %}

{% block content %}
    <div style="border: 1px solid #005a9e; padding: 20px; background: #fff;">
        <h2>Executive Summary for {{ user_name }}</h2>
        <p><small>Report Generated: {{ generated_at }}</small></p>
        
        <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
            <thead>
                <tr style="background: #005a9e; color: white; text-align: left;">
                    <th style="padding: 10px;">Metric</th>
                    <th style="padding: 10px;">Current Value</th>
                </tr>
            </thead>
            <tbody>
                {% for item in stats %}
                <tr style="border-bottom: 1px solid #ddd;">
                    <td style="padding: 10px;">{{ item.label }}</td>
                    <td style="padding: 10px;"><strong>{{ item.value }}</strong></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
{% endblock %}
