<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Enterprise Dashboard{% endblock %}</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background: #f0f2f5; }
        .wrapper { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        header { border-bottom: 3px solid #005a9e; padding-bottom: 10px; margin-bottom: 20px; }
        footer { margin-top: 30px; font-size: 0.8em; color: #888; text-align: center; }
        .auth-wrapper { float: right; } /* Position the widget */
    </style>
</head>
<body>
    <div class="wrapper">
        <header>
            <div class="auth-wrapper">
                {% include 'login_widget.html' %}
            </div>
            <h1>Corporate System</h1>
        </header>
        
        <nav>
            <a href="/">Home</a> | <a href="/reports">Reports</a>
        </nav>
        
        <main>
            {% block content %}{% endblock %}
        </main>

        <footer>&copy; 2026 Enterprise Silos</footer>
    </div>
</body>
</html>
