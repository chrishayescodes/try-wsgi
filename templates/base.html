<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Enterprise Dashboard{% endblock %}</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background: #f0f2f5; }
        .wrapper { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        header { border-bottom: 3px solid #005a9e; padding-bottom: 10px; margin-bottom: 20px; }
        footer { margin-top: 30px; font-size: 0.8em; color: #888; text-align: center; }
        .auth-wrapper { float: right; } /* Position the widget */
    </style>
</head>
<body>
    <div class="wrapper">
        <header>
            <div class="auth-wrapper">
                {% include 'login_widget.html' %}
            </div>
            <h1>Corporate System</h1>
        </header>
        
        <nav>
            <a href="/">Home</a> | <a href="/reports">Reports</a>
        </nav>
        
        <main>
            {% block content %}{% endblock %}
        </main>

        <footer>&copy; 2026 Enterprise Silos</footer>
    </div>
    <script>
        // Global Fetch Interceptor
        const originalFetch = window.fetch;

        window.fetch = async (...args) => {
            let response = await originalFetch(...args);

            // If we hit a 401, the Access Token is likely expired
            if (response.status === 401) {
                console.warn("Access token expired. Attempting refresh...");

                // Call the dedicated refresh silo
                const refreshResponse = await originalFetch('/refresh', { 
                    method: 'POST',
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                });

                if (refreshResponse.ok) {
                    console.log("Refresh successful. Retrying original request.");
                    // The refresh silo just set a new 'silo_token' cookie.
                    // Now we retry the original request once.
                    return await originalFetch(...args);
                } else {
                    console.error("Refresh failed. Redirecting to login.");
                    // If refresh fails (e.g., refresh token also expired), 
                    // clear session and send to home/login.
                    window.location.href = '/?error=session_expired';
                }
            }

            return response;
        };
    </script>
</body>
</html>
