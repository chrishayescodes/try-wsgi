<VirtualHost *:80>
    DocumentRoot /var/www/html

    # Start the persistent Python Daemon
    WSGIDaemonProcess python_silo processes=2 threads=15
    WSGIProcessGroup python_silo
    WSGIApplicationGroup %{GLOBAL}

    # EXPLICIT ROUTES (The "Silo" Mapping)
    # User hits /api/hello -> Apache executes the private hello.py
    WSGIScriptAlias /api/hello /var/www/silos/hello.py

    # Allow the Apache engine to access the private directory
    <Directory /var/www/silos>
        Require all granted
    </Directory>

    # Extra security: Ensure the public root doesn't list files
    <Directory /var/www/html>
        Options -Indexes
    </Directory>
</VirtualHost>